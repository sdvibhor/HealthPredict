<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HealthPredict</title>

  <!-- ✅ Main stylesheet -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

  <!-- ✅ PWA Settings -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0b1020">
  <link rel="apple-touch-icon" href="{{ url_for('static', filename='images/icon-192.png') }}">
</head>

<body>

  <!-- Navigation -->
  <nav class="nav">
    <a href="{{ url_for('home') }}" class="brand">HealthPredict</a>
    <a href="{{ url_for('home') }}">Home</a>
    <a href="{{ url_for('diseases') }}">Diseases</a>
    <a href="{{ url_for('bodymap') }}">Body Map</a>
    <a href="{{ url_for('bmi') }}">BMI</a>
    <a href="{{ url_for('chatbot') }}">AI Assistant</a>
    <a href="{{ url_for('encyclopedia') }}">Encyclopedia</a>
    <a href="{{ url_for('mental_health') }}">Mental Health</a>
    <a href="/medications">Medications</a>
    <a href="{{ url_for('history') }}">History</a>
    <a href="{{ url_for('firstaid') }}">First Aid</a>
    <a href="{{ url_for('hospitals') }}">Hospitals</a>
    <a href="{{ url_for('dashboard') }}">Dashboard</a>
    <a href="{{ url_for('about') }}">About</a>
  </nav>

  <!-- Main content -->
  <main>
    {% block content %}{% endblock %}
  </main>

  <!-- Footer -->
  <footer class="footer">
    <p>© 2025 HealthPredict · Educational demo — not medical advice</p>
  </footer>

  <!-- ✅ Unified Animation & Scroll Script -->
  <script>
    // ---- Scroll reveal animation (fade-ins, feature cards, timeline steps) ----
    const revealEls = document.querySelectorAll('.fade-in, .feature-card, .step');
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('show');
        }
      });
    }, { threshold: 0.2 });

    revealEls.forEach(el => observer.observe(el));

    // ---- Optional smooth scrolling for internal links ----
    document.querySelectorAll('a[href^="#"]').forEach(link => {
      link.addEventListener('click', function (e) {
        const target = document.querySelector(this.getAttribute('href'));
        if (target) {
          e.preventDefault();
          target.scrollIntoView({ behavior: 'smooth' });
        }
      });
    });

    // ---- Optional: Hero text + bubbles fade on load ----
    window.addEventListener('load', () => {
      const heroInner = document.querySelector('.hero-inner');
      const bubbles = document.querySelectorAll('.hero-bubble');
      if (heroInner) heroInner.classList.add('show');
      bubbles.forEach((b, i) => {
        setTimeout(() => b.classList.add('show'), i * 300);
      });
    });

    // ---- PWA Service Worker Registration ----
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(registration => {
            console.log('ServiceWorker registration successful with scope: ', registration.scope);
          }, err => {
            console.log('ServiceWorker registration failed: ', err);
          });
      });
    }
  </script>

  <!-- External JS if needed -->
  <!-- <script src="{{ url_for('static', filename='js/script.js') }}"></script> -->
</body>

</html>
