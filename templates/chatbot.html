{% extends "base.html" %}
{% block content %}
<section class="chat-section">
  <h2 class="chat-title">AI Nurse Assistant 🤖💊</h2>
  <div id="chat-window">
    <div id="chat-box"></div>
  </div>

  <div class="chat-input">
    <input type="text" id="user-input" placeholder="Type or speak your symptoms...">
    <button id="mic-btn">🎤</button>
    <button id="voice-toggle">🔊 Voice ON</button>
    <button id="stop-voice">⛔ Stop</button>
    <button id="send-btn">Send</button>
  </div>
</section>

<style>
/* Section container */
.chat-section {
  background: #1e1e2f;
  border-radius: 16px;
  padding: 20px;
  max-width: 700px;
  margin: auto;
  box-shadow: 0 8px 20px rgba(0,0,0,0.3);
  color: #f1f1f1;
  font-family: 'Segoe UI', sans-serif;
}

/* Title */
.chat-title {
  text-align: center;
  color: #9bb1ff;
  font-weight: 600;
  margin-bottom: 15px;
}

/* Chat window */
#chat-window {
  border: 1px solid #2d2d44;
  border-radius: 12px;
  height: 400px;
  overflow-y: auto;
  padding: 15px;
  background: #2a2a40;
  margin-bottom: 15px;
}

/* Chat bubble base */
.chat-bubble {
  max-width: 75%;
  padding: 12px 16px;
  margin: 8px 0;
  border-radius: 18px;
  font-size: 15px;
  line-height: 1.5;
  box-shadow: 0 3px 8px rgba(0,0,0,0.2);
  white-space: pre-wrap;
}

/* User bubble */
.user {
  background: linear-gradient(135deg, #3a62ff, #2a4bd8);
  color: white;
  margin-left: auto;
  text-align: right;
  border-bottom-right-radius: 4px;
}

/* Bot bubble */
.bot {
  background: linear-gradient(135deg, #444466, #5a5a7a);
  color: #f5f5f5;
  margin-right: auto;
  border-bottom-left-radius: 4px;
}

/* Input box and buttons */
.chat-input {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.chat-input input {
  flex: 1;
  padding: 12px;
  border: 1px solid #3a3a55;
  border-radius: 10px;
  background: #2a2a40;
  color: #f1f1f1;
}
.chat-input input::placeholder {
  color: #9a9ab5;
}
.chat-input button {
  background: linear-gradient(135deg, #3a62ff, #2a4bd8);
  border: none;
  color: white;
  padding: 10px 14px;
  border-radius: 10px;
  cursor: pointer;
  font-weight: 600;
}
.chat-input button:hover {
  background: linear-gradient(135deg, #4d78ff, #3558d8);
}
#mic-btn.active {
  background: #ff3a5a;
  animation: pulse 1s infinite;
}
@keyframes pulse {
  0% { box-shadow: 0 0 0 0 rgba(255,58,90,0.7); }
  70% { box-shadow: 0 0 0 10px rgba(255,58,90,0); }
  100% { box-shadow: 0 0 0 0 rgba(255,58,90,0); }
}
</style>

<script>
document.getElementById("send-btn").addEventListener("click", sendMessage);
document.getElementById("user-input").addEventListener("keypress", function(e) {
  if (e.key === "Enter") sendMessage();
});

let voiceEnabled = true;

// Add message
function addMessage(content, sender) {
  const chatBox = document.getElementById("chat-box");
  const msg = document.createElement("div");
  msg.classList.add("chat-bubble", sender);
  msg.innerText = content;
  chatBox.appendChild(msg);
  chatBox.scrollTop = chatBox.scrollHeight;

  if (sender === "bot" && voiceEnabled) {
    speakText(content);
  }
}

// Send message
function sendMessage() {
  const input = document.getElementById("user-input");
  const message = input.value.trim();
  if (!message) return;

  addMessage(message, "user");
  input.value = "";

  fetch("/chatbot", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ message })
  })
  .then(res => res.json())
  .then(data => addMessage(data.reply, "bot"))
  .catch(err => addMessage("⚠️ Error: " + err, "bot"));
}

/* 🎤 Voice Input */
const micBtn = document.getElementById("mic-btn");
let recognition;
if ("webkitSpeechRecognition" in window) {
  recognition = new webkitSpeechRecognition();
  recognition.lang = "en-US";
  recognition.continuous = false;
  recognition.interimResults = false;

  recognition.onstart = () => micBtn.classList.add("active");
  recognition.onend = () => micBtn.classList.remove("active");
  recognition.onresult = (e) => {
    const transcript = e.results[0][0].transcript;
    document.getElementById("user-input").value = transcript;
    sendMessage();
  };

  micBtn.addEventListener("click", () => recognition.start());
} else {
  micBtn.disabled = true;
  micBtn.innerText = "🚫";
}

/* 🔊 Voice Output */
function speakText(text) {
  if ('speechSynthesis' in window) {
    // Stop any ongoing speech before starting new
    window.speechSynthesis.cancel();

    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = "en-US";
    utterance.pitch = 1;
    utterance.rate = 1;
    window.speechSynthesis.speak(utterance);
  }
}

/* 🎚️ Voice Toggle */
const voiceToggle = document.getElementById("voice-toggle");
voiceToggle.addEventListener("click", () => {
  voiceEnabled = !voiceEnabled;
  voiceToggle.textContent = voiceEnabled ? "🔊 Voice ON" : "🔇 Voice OFF";
});

/* ⛔ Stop Voice Button */
document.getElementById("stop-voice").addEventListener("click", () => {
  if ('speechSynthesis' in window) {
    window.speechSynthesis.cancel();
  }
});
</script>
{% endblock %}
