{% extends "base.html" %}
{% block content %}
<section class="content card">
  <h2>Kidney Issues Checker</h2>
  <form method="POST">
    <div class="grid2">
      <label>Blood Pressure (mmHg)<input type="number" inputmode="decimal" step="any" name="bp" required></label>
    </div>
    <fieldset>
      <legend>Symptoms</legend>
      <label><input type="checkbox" name="fatigue"> Fatigue</label>
      <label><input type="checkbox" name="lower_abdominal_pain"> Lower abdominal pain</label>
      <label><input type="checkbox" name="burning_urination"> Burning urination</label>
      <label><input type="checkbox" name="leg_swelling"> Leg swelling</label>
    </fieldset>
    <button class="btn" type="submit">Predict</button>
  </form>
</section>
{% endblock %}
